<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heap Visualizer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* 🔹 INTRO SCREEN */
#intro {
    height: 100vh;
    background: linear-gradient(to right, #141e30, #243b55);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#intro h1 {
    font-size: 50px;
}

.team {
    margin-top: 20px;
    font-size: 20px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    background: #ff9800;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #e68900;
}

/* 🔹 MAIN APP */
#app {
    display: none;
    background: linear-gradient(to right, #1d2671, #c33764);
    min-height: 100vh;
    color: white;
    text-align: center;
}

.controls {
    padding: 20px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* TREE */
#tree {
    position: relative;
    height: 450px;
}

/* Node */
.node {
    position: absolute;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: #00e5ff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    transition: all 1s ease;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Highlight */
.active {
    background: #ff4081 !important;
    transform: scale(1.3);
}

/* SVG Lines */
svg {
    position: absolute;
    top: 0;
    left: 0;
}

line {
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px white);
}

/* HELP BOX */
#helpBox {
    display: none;
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: black;
    padding: 20px;
    width: 320px;
    border-radius: 10px;
}
</style>

</head>
<body>

<!-- 🔥 INTRO -->
<div id="intro">
    <h1>🌳 Heap Visualizer</h1>

    <div class="team">
        Team Members:<br>
          Kopika<br>
          Madhu vidya<br>
          Jabeen<br>
          Shakthi priya<br>
          Hema dharshini<br>
        
    </div>

    <button onclick="startApp()">Enter</button>
</div>

<!-- 🔥 MAIN -->
<div id="app">

    <h1>Heap Visualizer</h1>

    <div class="controls">
        <select id="type">
            <option value="min">Min Heap</option>
            <option value="max">Max Heap</option>
        </select>

        <input type="number" id="value" placeholder="Enter value">

        <button onclick="insert()">Insert</button>
        <button onclick="deleteRoot()">Delete Root</button>
        <button onclick="showHelp()">Help</button>
    </div>

    <div id="tree"></div>
</div>

<!-- 🔥 HELP -->
<div id="helpBox">
    <h3>What is Heap?</h3>
    <p>
        Heap is a Tree-based Data Structure.
        Min Heap → Parent is smaller.<br>
        Max Heap → Parent is larger.
    </p>

    <h4>Uses:</h4>
    <p>
        • Priority Queue<br>
        • Scheduling<br>
        • Shortest Path Algorithms
    </p>

    <button onclick="closeHelp()">Close</button>
</div>

<script>
let heap = [];

// Start
function startApp() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("app").style.display = "block";
}

// Compare
function compare(a, b) {
    return document.getElementById("type").value === "min" ? a < b : a > b;
}

// Insert
function insert() {
    let val = document.getElementById("value").value;
    if (!val) return;

    heap.push(parseInt(val));
    heapifyUp(heap.length - 1);
}

// Heapify Up
async function heapifyUp(i) {
    if (i === 0) return render();

    let parent = Math.floor((i - 1) / 2);

    if (compare(heap[i], heap[parent])) {
        highlight(i, parent);
        await sleep(1000);

        [heap[i], heap[parent]] = [heap[parent], heap[i]];
        render();

        await heapifyUp(parent);
    } else render();
}

// Delete Root
function deleteRoot() {
    if (heap.length === 0) return;

    heap[0] = heap[heap.length - 1];
    heap.pop();
    heapifyDown(0);
}

// Heapify Down
async function heapifyDown(i) {
    let left = 2*i + 1;
    let right = 2*i + 2;
    let target = i;

    if (left < heap.length && compare(heap[left], heap[target])) target = left;
    if (right < heap.length && compare(heap[right], heap[target])) target = right;

    if (target !== i) {
        highlight(i, target);
        await sleep(1000);

        [heap[i], heap[target]] = [heap[target], heap[i]];
        render();

        await heapifyDown(target);
    } else render();
}

// Highlight
function highlight(i, j) {
    render();
    setTimeout(() => {
        document.getElementById("node-"+i)?.classList.add("active");
        document.getElementById("node-"+j)?.classList.add("active");
    }, 100);
}

// Sleep
function sleep(ms) {
    return new Promise(res => setTimeout(res, ms));
}

// 🔥 RENDER WITH LINES
function render() {
    const tree = document.getElementById("tree");
    tree.innerHTML = "";

    let width = tree.clientWidth;

    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "100%");
    svg.setAttribute("height", "100%");
    tree.appendChild(svg);

    let positions = [];

    // Nodes
    heap.forEach((val, i) => {
        let level = Math.floor(Math.log2(i+1));
        let pos = i - (Math.pow(2, level)-1);

        let gap = width / (Math.pow(2, level)+1);
        let x = gap * (pos+1);
        let y = level * 90 + 20;

        positions[i] = {x, y};

        let node = document.createElement("div");
        node.className = "node";
        node.id = "node-"+i;
        node.innerText = val;

        node.style.left = x+"px";
        node.style.top = y+"px";

        tree.appendChild(node);
    });

    // Lines
    heap.forEach((val, i) => {
        if (i === 0) return;

        let parent = Math.floor((i - 1) / 2);

        let line = document.createElementNS("http://www.w3.org/2000/svg", "line");

        line.setAttribute("x1", positions[parent].x + 27);
        line.setAttribute("y1", positions[parent].y + 27);
        line.setAttribute("x2", positions[i].x + 27);
        line.setAttribute("y2", positions[i].y + 27);

        line.setAttribute("stroke", "white");
        line.setAttribute("stroke-width", "3");

        svg.appendChild(line);
    });
}

// Help
function showHelp() {
    document.getElementById("helpBox").style.display = "block";
}

function closeHelp() {
    document.getElementById("helpBox").style.display = "none";
}
</script>

</body>
</html>
