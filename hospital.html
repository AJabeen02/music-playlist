<!DOCTYPE html>
<html>
<head>
<title>Hospital Priority System</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.controls input, button {
    padding: 10px;
    margin: 5px;
}

button {
    background: #22c55e;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

/* Tree area */
#tree {
    position: relative;
    height: 450px;
}

/* Patient card */
.node {
    position: absolute;
    width: 100px;
    height: 60px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.6s ease;
    animation: fadeIn 0.5s ease;
}

/* Severity colors */
.critical { background: #ef4444; }
.moderate { background: #facc15; color: black; }
.low { background: #22c55e; }

/* Highlight animation */
.highlight {
    animation: pulse 0.6s infinite alternate;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* Treat animation */
.fadeOut {
    animation: disappear 0.5s forwards;
}

@keyframes disappear {
    to { opacity: 0; transform: scale(0); }
}
</style>

</head>

<body>

<h1>🏥 Emergency Room System</h1>

<div class="controls">
    <input id="name" placeholder="Patient Name">
    <input id="sev" type="number" placeholder="Severity (1-10)">
    <button onclick="addPatient()">Add Patient</button>
    <button onclick="treatPatient()">Treat Patient</button>
</div>

<div id="tree"></div>

<script>
let heap = [];

function getClass(sev) {
    if (sev >= 8) return "critical";
    if (sev >= 5) return "moderate";
    return "low";
}

function getLabel(sev) {
    if (sev >= 8) return "Critical";
    if (sev >= 5) return "Moderate";
    return "Low";
}

function addPatient() {
    let name = document.getElementById("name").value;
    let sev = document.getElementById("sev").value;
    if (!name || !sev) return;

    heap.push({name, sev:Number(sev)});
    draw();
    heapifyUp(heap.length - 1);
}

function treatPatient() {
    if (heap.length === 0) return;

    let nodes = document.querySelectorAll(".node");
    if (nodes[0]) nodes[0].classList.add("fadeOut");

    setTimeout(() => {
        heap[0] = heap[heap.length - 1];
        heap.pop();
        draw();
        heapifyDown(0);
    }, 500);
}

// Heapify Up
function heapifyUp(i) {
    if (i === 0) return;

    let parent = Math.floor((i - 1) / 2);
    highlight(i, parent);

    if (heap[i].sev > heap[parent].sev) {
        setTimeout(() => {
            [heap[i], heap[parent]] = [heap[parent], heap[i]];
            draw();
            heapifyUp(parent);
        }, 600);
    }
}

// Heapify Down
function heapifyDown(i) {
    let left = 2*i+1, right = 2*i+2, largest = i;

    if (left < heap.length && heap[left].sev > heap[largest].sev)
        largest = left;

    if (right < heap.length && heap[right].sev > heap[largest].sev)
        largest = right;

    if (largest !== i) {
        highlight(i, largest);

        setTimeout(() => {
            [heap[i], heap[largest]] = [heap[largest], heap[i]];
            draw();
            heapifyDown(largest);
        }, 600);
    }
}

// Draw Tree
function draw() {
    let tree = document.getElementById("tree");
    tree.innerHTML = "";

    heap.forEach((p,i)=>{
        let node = document.createElement("div");
        node.className = "node " + getClass(p.sev);

        node.innerHTML = `<b>${p.name}</b><br>${getLabel(p.sev)}`;

        let level = Math.floor(Math.log2(i+1));
        let pos = i-(2**level-1);

        node.style.top = level*90 + "px";
        node.style.left = (pos+1)*140 + "px";

        tree.appendChild(node);
    });
}

// Highlight comparison
function highlight(i, j) {
    let nodes = document.querySelectorAll(".node");

    if (nodes[i] && nodes[j]) {
        nodes[i].classList.add("highlight");
        nodes[j].classList.add("highlight");

        setTimeout(() => {
            nodes[i].classList.remove("highlight");
            nodes[j].classList.remove("highlight");
        }, 500);
    }
}
</script>

</body>
</html>
