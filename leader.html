<!DOCTYPE html>
<html>
<head>
<title>Leaderboard Heap</title>
<style>
body { text-align:center; font-family:Arial; background:#111; color:white; }
.node {
  position:absolute;
  width:70px; height:70px;
  background:#22c55e;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.5s;
}
</style>
</head>

<body>

<h2>🏆 Leaderboard (Max Heap)</h2>

<input id="name" placeholder="Player">
<input id="score" type="number" placeholder="Score">
<button onclick="addPlayer()">Add</button>
<button onclick="removeTop()">Remove Top</button>

<div id="tree" style="position:relative;height:400px;"></div>

<script>
let heap = [];

function addPlayer() {
  let name = document.getElementById("name").value;
  let score = document.getElementById("score").value;
  if (!name || !score) return;

  heap.push({name, score:Number(score)});
  heapifyUp(heap.length - 1);
  draw();
}

function removeTop() {
  if (heap.length === 0) return;
  heap[0] = heap.pop();
  heapifyDown(0);
  draw();
}

function heapifyUp(i) {
  let parent = Math.floor((i - 1)/2);
  if (i > 0 && heap[i].score > heap[parent].score) {
    [heap[i], heap[parent]] = [heap[parent], heap[i]];
    heapifyUp(parent);
  }
}

function heapifyDown(i) {
  let left = 2*i+1, right = 2*i+2, largest = i;

  if (left < heap.length && heap[left].score > heap[largest].score)
    largest = left;

  if (right < heap.length && heap[right].score > heap[largest].score)
    largest = right;

  if (largest !== i) {
    [heap[i], heap[largest]] = [heap[largest], heap[i]];
    heapifyDown(largest);
  }
}

function draw() {
  let tree = document.getElementById("tree");
  tree.innerHTML = "";

  heap.forEach((p,i)=>{
    let node = document.createElement("div");
    node.className="node";
    node.innerHTML = p.name+"<br>"+p.score;

    let level = Math.floor(Math.log2(i+1));
    let pos = i-(2**level-1);

    node.style.top = level*80+"px";
    node.style.left = (pos+1)*120+"px";

    tree.appendChild(node);
  });
}
</script>

</body>
</html>
